<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typst WYSIWYG Editor</title>
  <link href="quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════ APP SHELL ═══════════════════ -->
<div id="app">

  <!-- ── Header ── -->
  <header id="header">
    <div class="header-brand">
      <span class="logo">✏️</span>
      <span class="brand-name">Typst WYSIWYG Editor</span>
    </div>
    <div class="header-actions">
      <label class="format-label" for="output-format">Wynik:</label>
      <select id="output-format" class="format-select">
        <option value="typst">Typst</option>
        <option value="html">HTML</option>
      </select>
      <button class="btn-primary" id="btn-export" title="Eksportuj do PDF">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zm4 18H6V4h7v5h5zM8 14h8v2H8zm0 4h5v2H8zm0-8h2v2H8z"/></svg>
        <span>Eksportuj PDF</span>
      </button>
    </div>
  </header>

  <!-- ── Main Area ── -->
  <div id="main">
    <div id="editor-pane">
      <div id="editor"></div>
    </div>
    <div id="panel-divider" title="Przeciągnij aby zmienić szerokość"></div>
    <div id="typst-pane">
      <div id="typst-pane-header">
        <span id="output-format-label">Źródło Typst</span>
        <button id="btn-copy-output" title="Kopiuj zawartość">Kopiuj</button>
      </div>
      <pre id="typst-source"></pre>
    </div>
  </div>

  <!-- ── Status Bar ── -->
  <div id="statusbar">
    <span id="word-count">Słowa: 0</span>
    <span class="sep">|</span>
    <span id="char-count">Znaki: 0</span>
    <span class="flex-spacer"></span>
    <span id="status-msg"></span>
  </div>

</div><!-- /#app -->

<!-- Export result toast -->
<div id="toast" class="hidden"></div>

<script src="quill.min.js"></script>
<script src="editor.js"></script>
</body>
</html>
